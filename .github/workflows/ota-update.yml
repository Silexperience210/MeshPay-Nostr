name: OTA Update (Expo)

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - 'components/**'
      - 'constants/**'
      - 'hooks/**'
      - 'providers/**'
      - 'utils/**'
      - 'assets/**'
      - 'package.json'
      - 'app.json'
  workflow_dispatch:
    inputs:
      message:
        description: 'Update message'
        required: false
        default: 'Manual OTA update'

jobs:
  ota:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Publish OTA update
        run: |
          MESSAGE="${{ github.event.inputs.message || format('OTA {0} — {1}', github.ref_name, github.sha) }}"
          npx eas-cli update \
            --channel preview \
            --message "$MESSAGE" \
            --non-interactive \
            --auto
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

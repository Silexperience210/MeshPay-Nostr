name: Build & Release APK

on:
  push:
    tags:
      - 'apk-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: v1.0.0)'
        required: false
        default: 'v1.0.0'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # EAS remote build : build sur les serveurs Expo, on récupère l'URL via --json
      - name: Build APK via EAS (remote) + Download
        run: |
          echo "Starting EAS remote build..."
          BUILD_JSON=$(EAS_SKIP_AUTO_FINGERPRINT=1 eas build \
            --platform android \
            --profile ci \
            --non-interactive \
            --json 2>/dev/null)

          echo "Build JSON:"
          echo "$BUILD_JSON"

          APK_URL=$(echo "$BUILD_JSON" | python3 -c "
import sys, json
data = json.load(sys.stdin)
builds = data if isinstance(data, list) else [data]
print(builds[0]['artifacts']['buildUrl'])
")
          echo "APK URL: $APK_URL"
          curl -fL "$APK_URL" -o meshpay.apk
          echo "Downloaded: $(du -sh meshpay.apk)"

      - name: Get version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: mv meshpay.apk "MeshPay-${{ steps.tag.outputs.TAG }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "MeshPay ${{ steps.tag.outputs.TAG }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: "MeshPay-${{ steps.tag.outputs.TAG }}.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

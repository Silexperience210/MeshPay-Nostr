name: Build & Release APK

on:
  push:
    tags:
      - 'apk-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ex: v1.0.0)'
        required: false
        default: 'v1.0.0'

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # bun.lock conflicte avec npm ci (EAS CLI utilise npm)
      - name: Remove bun.lock
        run: rm -f bun.lock

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK via EAS
        run: |
          EAS_SKIP_AUTO_FINGERPRINT=1 eas build \
            --platform android \
            --profile ci \
            --non-interactive \
            --output ./meshpay.apk

      - name: Get version tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Rename APK
        run: mv meshpay.apk "MeshPay-${{ steps.tag.outputs.TAG }}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "MeshPay ${{ steps.tag.outputs.TAG }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: "MeshPay-${{ steps.tag.outputs.TAG }}.apk"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Android Build Release

on:
  push:
    tags:
      - 'apk-*'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # bun install execute automatiquement postinstall (scripts/patch-meshcore.js)
        run: bun install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('package-lock.json', 'package.json') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Fix Gradle JVM memory
        # expo prebuild genere gradle.properties avec Xmx2048m/Metaspace=512m
        # ce qui ecrase notre GRADLE_OPTS — on corrige directement dans le fichier
        run: |
          if grep -q "org.gradle.jvmargs" android/gradle.properties; then
            sed -i 's|org.gradle.jvmargs=.*|org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1280m -XX:+HeapDumpOnOutOfMemoryError|' android/gradle.properties
          else
            echo "org.gradle.jvmargs=-Xmx3072m -XX:MaxMetaspaceSize=1280m -XX:+HeapDumpOnOutOfMemoryError" >> android/gradle.properties
          fi
          echo "[OK] $(grep jvmargs android/gradle.properties)"

      - name: Add signing credentials to gradle.properties
        # Ajout des credentials en env vars (evite les problemes de shell expansion)
        run: |
          printf '\nMYAPP_UPLOAD_STORE_FILE=meshpay-release.keystore\n' >> android/gradle.properties
          printf 'MYAPP_UPLOAD_KEY_ALIAS=%s\n' "$KEY_ALIAS" >> android/gradle.properties
          printf 'MYAPP_UPLOAD_STORE_PASSWORD=%s\n' "$KEYSTORE_PASSWORD" >> android/gradle.properties
          printf 'MYAPP_UPLOAD_KEY_PASSWORD=%s\n' "$KEY_PASSWORD" >> android/gradle.properties
          echo "[OK] Signing credentials ajoutes a gradle.properties"
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Fix compileSdkVersion on all subprojects
        # Corrige: "resource android:attr/lStar not found"
        # react-native-usb-serialport-for-android (dep transitive de @liamcottle/meshcore.js)
        # compile avec SDK < 31, alors que lStar est un attribut Material You (API 31+).
        # Solution: forcer compileSdkVersion 35 sur tous les sous-projets via afterEvaluate.
        run: |
          printf '\n// CI Fix: force compileSdkVersion 35 (corrige lStar / Material You)\n' >> android/build.gradle
          printf 'subprojects {\n' >> android/build.gradle
          printf '    afterEvaluate {\n' >> android/build.gradle
          printf '        try { android { compileSdkVersion 35 } } catch (Exception ignored) {}\n' >> android/build.gradle
          printf '    }\n' >> android/build.gradle
          printf '}\n' >> android/build.gradle
          echo "[OK] android/build.gradle patche"
          echo "Dernières lignes de android/build.gradle:"
          tail -8 android/build.gradle

      - name: Restore Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/meshpay-release.keystore
          echo "[OK] Keystore restaure: $(wc -c < android/app/meshpay-release.keystore) bytes"

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -x lint \
            -x lintRelease \
            -x lintVitalRelease \
            -x lintVitalAnalyzeRelease \
            -PMYAPP_UPLOAD_STORE_FILE=meshpay-release.keystore \
            "-PMYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" \
            "-PMYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" \
            "-PMYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" \
            --no-daemon \
            --max-workers=2 \
            --warning-mode none
        timeout-minutes: 55
        env:
          GRADLE_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=1280m"

      - name: Verify APK
        run: |
          APK_SIGNED="android/app/build/outputs/apk/release/app-release.apk"
          APK_UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$APK_SIGNED" ]; then
            echo "[OK] APK signe: $(du -h $APK_SIGNED | cut -f1)"
          elif [ -f "$APK_UNSIGNED" ]; then
            echo "[WARN] APK non signe - verifier KEYSTORE_BASE64, KEY_ALIAS, KEYSTORE_PASSWORD, KEY_PASSWORD"
            mv "$APK_UNSIGNED" "$APK_SIGNED"
          else
            echo "[ERROR] Aucun APK trouve!"
            ls -la android/app/build/outputs/apk/release/ 2>/dev/null || true
            exit 1
          fi

      - name: Rename APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/MeshPay-${{ steps.version.outputs.VERSION }}.apk
          echo "[OK] APK -> MeshPay-${{ steps.version.outputs.VERSION }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeshPay-${{ steps.version.outputs.VERSION }}
          path: android/app/build/outputs/apk/release/MeshPay-${{ steps.version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "MeshPay ${{ steps.version.outputs.VERSION }}"
          body: |
            ## MeshPay ${{ steps.version.outputs.VERSION }}

            **Commit**: ${{ github.sha }}
            **Tag declencheur**: ${{ github.ref_name }}
            **Message**: ${{ github.event.head_commit.message }}

            ### Installation
            1. Telecharger le fichier `.apk` ci-dessous
            2. Sur Android : Parametres > Securite > Autoriser sources inconnues
            3. Installer et profiter !

            ### Fonctionnalites
            - Messagerie P2P via LoRa (MeshCore) + BLE
            - Identite Bitcoin (cle secp256k1)
            - Portefeuille Cashu (e-cash off-chain)
          files: android/app/build/outputs/apk/release/MeshPay-${{ steps.version.outputs.VERSION }}.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old releases (keep 5)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Android Build Release

on:
  push:
    tags:
      - 'apk-*'
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          bun install
          bun run postinstall

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/build.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Generate version
        id: version
        run: |
          VERSION="v1.0.${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # android/ est dans .gitignore → on le génère via Expo
      - name: Expo Prebuild (génère android/)
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_DOTENV: 1

      - name: Restore Keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/meshpay-release.keystore

      - name: Setup Signing Config
        run: |
          cat > android/app/signing.properties << EOF
          MYAPP_UPLOAD_STORE_FILE=meshpay-release.keystore
          MYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          export GRADLE_OPTS="-Xmx3072m -XX:MaxMetaspaceSize=768m"
          ./gradlew assembleRelease \
            -PMYAPP_UPLOAD_STORE_FILE=meshpay-release.keystore \
            "-PMYAPP_UPLOAD_KEY_ALIAS=${{ secrets.KEY_ALIAS }}" \
            "-PMYAPP_UPLOAD_STORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" \
            "-PMYAPP_UPLOAD_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" \
            --no-daemon \
            --max-workers=2
        timeout-minutes: 40
        env:
          JAVA_OPTS: "-Xmx3072m -XX:MaxMetaspaceSize=768m"

      - name: Rename APK with version
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk \
             android/app/build/outputs/apk/release/MeshPay-${{ steps.version.outputs.VERSION }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeshPay-${{ steps.version.outputs.VERSION }}
          path: android/app/build/outputs/apk/release/MeshPay-${{ steps.version.outputs.VERSION }}.apk

      - name: Delete old releases (garder les 5 dernières)
        uses: dev-drprasad/delete-older-releases@v0.3.4
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: "MeshPay ${{ steps.version.outputs.VERSION }}"
          body: |
            ## MeshPay ${{ steps.version.outputs.VERSION }}

            **Commit** : ${{ github.sha }}
            **Message** : ${{ github.event.head_commit.message }}

            ### Installation
            1. Télécharger le fichier `.apk` ci-dessous
            2. Autoriser l\'installation depuis sources inconnues
            3. Installer et profiter !
          files: android/app/build/outputs/apk/release/MeshPay-${{ steps.version.outputs.VERSION }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
